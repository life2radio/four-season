<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>포시즌 기억정원 · 어르신 인지자극</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<style>
  :root{
    --bg:#F4F0E7; --ink:#2A2723; --muted:#8B8475;
    --green:#2F5A47; --green-d:#21402F; --amber:#AD8A52; --coral:#B0634A;
    --card:#FFFFFF; --line:#E6DDCB; --sky:#EAF0EB; --gold-bg:#F2E8D3;
    --spring:#C68A96; --summer:#5E8C6A; --autumn:#BF6F3C; --winter:#7E94A3;
    --serif:'Iowan Old Style','Apple Garamond',Georgia,'Times New Roman',serif;
    --fs: 1; /* font scale, controlled by JS */
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg); color:var(--ink);
    font-size:calc(20px * var(--fs));
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  #root{max-width:760px; margin:0 auto; min-height:100vh;}
  button{font-family:inherit; cursor:pointer; border:none;}
  .wrap{padding:18px 18px 40px;}
  .topbar{display:flex; align-items:center; gap:10px; padding:12px 14px;
    background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5;}
  .topbar .brand{font-weight:800; font-size:1.05em; color:var(--green-d); letter-spacing:-.5px; white-space:nowrap;}
  .topbar .leaf{font-size:1.4em;}
  .top-right{margin-left:auto; display:flex; gap:6px;}
  .icon-btn{background:var(--sky); color:var(--green-d); border-radius:12px;
    padding:9px 11px; font-size:.8em; font-weight:700; border:1px solid var(--line); white-space:nowrap;}
  .icon-btn.off{background:#F0ECE2; color:var(--muted);}

  h1{font-size:1.7em; margin:.2em 0; letter-spacing:-1px; font-weight:800;}
  h2{font-size:1.32em; margin:.4em 0; font-weight:800; letter-spacing:-.4px;}
  p.lead{font-size:1.05em; color:var(--muted); margin:.3em 0 1em;}
  .eyebrow{font-family:var(--serif); font-style:italic; color:var(--amber);
    letter-spacing:.5px; font-size:.9em;}
  .kicker{text-transform:uppercase; letter-spacing:.28em; font-size:.62em;
    font-weight:700; color:var(--amber);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:20px; margin:14px 0; box-shadow:0 1px 2px rgba(42,39,35,.04), 0 8px 24px rgba(42,39,35,.035);}

  .big-btn{display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; background:var(--green); color:#fff; font-size:1.18em; font-weight:700;
    padding:18px; border-radius:14px; box-shadow:0 2px 0 rgba(33,64,47,.3), 0 8px 20px rgba(33,64,47,.14);
    transition:transform .06s, box-shadow .06s; letter-spacing:-.3px;}
  .big-btn:active{transform:translateY(2px); box-shadow:0 0 0 rgba(33,64,47,.3), 0 3px 10px rgba(33,64,47,.12);}
  .big-btn.amber{background:var(--amber); box-shadow:0 2px 0 rgba(125,98,52,.4), 0 8px 20px rgba(173,138,82,.18);}
  .big-btn.amber:active{box-shadow:0 0 0, 0 3px 10px rgba(173,138,82,.15);}
  .big-btn.ghost{background:var(--card); color:var(--green-d); border:1.5px solid var(--green);
    box-shadow:0 1px 2px rgba(42,39,35,.04);}
  .big-btn.ghost:active{transform:translateY(1px);}
  .big-btn[disabled]{opacity:.45; box-shadow:none; transform:none;}

  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;}

  .domain-card{background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px 14px; text-align:center; box-shadow:0 1px 2px rgba(42,39,35,.04); position:relative;}
  .domain-card .emo{font-size:2.4em; line-height:1;}
  .domain-card .nm{font-weight:800; font-size:1.05em; margin-top:6px;}
  .domain-card .lv{display:inline-block; margin-top:8px; background:var(--gold-bg);
    color:#7C5E2A; font-weight:700; font-size:.8em; padding:4px 12px; border-radius:30px;}
  .domain-card.done{border-color:var(--green); background:var(--sky);}
  .domain-card .check{position:absolute; top:10px; right:12px; font-size:1.3em;}

  .pill{display:inline-block; background:var(--gold-bg); color:#7C5E2A;
    padding:6px 16px; border-radius:30px; font-weight:700; font-size:.85em;}

  .opt-btn{width:100%; background:var(--card); border:2px solid var(--line);
    border-radius:14px; padding:20px 16px; font-size:1.25em; font-weight:700;
    margin:10px 0; text-align:center; transition:.08s; box-shadow:0 1px 2px rgba(42,39,35,.04); position:relative;}
  .opt-btn:active{transform:scale(.985);}
  .opt-btn.correct{border-color:var(--green); background:var(--sky); color:var(--green-d);}
  .opt-btn.wrong{border-color:var(--coral); background:#F7EAE6; color:var(--coral);}
  .opt-btn.correct::after{content:"✓"; position:absolute; top:8px; right:12px; font-size:.95em; font-weight:900; color:var(--green);}
  .opt-btn.wrong::after{content:"✗"; position:absolute; top:8px; right:12px; font-size:.95em; font-weight:900; color:var(--coral);}

  /* 고대비 모드 */
  body.hc{ --ink:#15120E; --muted:#4A4438; --line:#B7AC92; --green-d:#173E2A; --coral:#9A3320; }
  body.hc .card{ border-color:#9A8F76; }
  body.hc .opt-btn{ border-width:3px; }
  body.hc .opt-btn.correct{ background:#DCEBDF; }
  body.hc .opt-btn.wrong{ background:#F3DED8; }
  body.hc .big-btn.ghost{ border-width:2px; border-color:#9A8F76; }
  body.hc .progress{ border:1px solid #9A8F76; }

  .tile{aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
    font-size:2.4em; background:#F3EFE4; border:3px solid var(--line); border-radius:16px;
    user-select:none; transition:.1s;}
  .tile.flip{background:var(--card); border-color:var(--amber);}
  .tile.matched{background:var(--sky); border-color:var(--green); opacity:.85;}
  .tile.lit{background:var(--amber); border-color:#C9821F;}
  .tile.target-hit{background:var(--sky); border-color:var(--green);}
  .tile.target-miss{background:#FBEDEB; border-color:var(--coral);}
  .tile.tap{background:var(--card); border-color:var(--green);}

  .progress{height:18px; background:#EDE6D6; border-radius:30px; overflow:hidden;}
  .progress > span{display:block; height:100%; background:var(--green); border-radius:30px;}

  .garden{background:linear-gradient(180deg,#F3F5F0 0%, #EAF0EB 100%);
    border:1px solid var(--line); border-radius:14px; overflow:hidden;}
  /* 사계절 나무 + 피어나는 꽃 */
  .tree-stage{position:relative; width:100%; aspect-ratio:600/623;}
  .tree-stage > img{position:absolute; inset:0; width:100%; height:100%; object-fit:contain;}
  .blossom{position:absolute; width:10%; max-width:42px; aspect-ratio:1/1;
    transform:translate(-50%,-50%) scale(0); transform-origin:center;
    animation:bloom .6s cubic-bezier(.34,1.56,.64,1) forwards;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.12));}
  @keyframes bloom{ 0%{transform:translate(-50%,-50%) scale(0); opacity:0;}
    60%{transform:translate(-50%,-50%) scale(1.15); opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1); opacity:1;} }
  .reward-big{font-size:4em; text-align:center; margin:10px 0;}

  .field{margin:14px 0;}
  .field label{display:block; font-weight:800; margin-bottom:8px;}
  .field input, .field select{width:100%; padding:16px; font-size:1.1em; font-family:inherit;
    border:2px solid var(--line); border-radius:14px; background:#fff;}
  .row{display:flex; gap:10px; flex-wrap:wrap;}
  .chip{padding:14px 18px; border-radius:14px; border:2px solid var(--line);
    background:#fff; font-weight:800; font-size:1em;}
  .chip.sel{border-color:var(--green); background:var(--sky); color:var(--green-d);}

  .center{text-align:center;}
  .muted{color:var(--muted);}
  .small{font-size:.82em;}
  .spacer{height:10px;}
  .countdown{font-size:3em; font-weight:800; text-align:center; color:var(--amber);}
  .emoji-prompt{font-size:3em; text-align:center; margin:6px 0;}
  .disclaimer{font-size:.74em; color:var(--muted); text-align:center; padding:18px 12px 0; line-height:1.5;}
  .report-row{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px dashed var(--line);}
  .report-row .rd-emo{font-size:1.8em; width:42px; text-align:center;}
  .report-row .rd-body{flex:1;}
  .report-row .rd-nm{font-weight:800;}

  /* 어르신 목록 격자: 좁은 화면 2칸, 넓은 화면 4칸 */
  .elder-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px;}
  @media (min-width:560px){ .elder-grid{grid-template-columns:repeat(3,1fr);} }
  @media (min-width:760px){ .elder-grid{grid-template-columns:repeat(4,1fr);} }
  .elder-card{display:flex; flex-direction:column; align-items:center; gap:4px;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 8px 12px; box-shadow:0 1px 2px rgba(42,39,35,.04); text-align:center; cursor:pointer;
    transition:transform .08s, box-shadow .08s;}
  .elder-card:active{transform:translateY(1px);}
  .elder-card .em{font-size:2.2em; line-height:1;}
  .elder-card .nm{font-weight:800; font-size:1.05em; word-break:keep-all;}
  .elder-card .meta{font-size:.72em; color:var(--muted);}
  .elder-card .go{margin-top:6px; background:var(--gold-bg); color:#7C5E2A;
    font-weight:700; font-size:.78em; padding:5px 14px; border-radius:30px;}
  .elder-add{display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    background:transparent; border:1.5px dashed var(--amber); border-radius:14px; color:#8A6A2E;
    padding:16px 8px; cursor:pointer; min-height:118px; font-weight:700;}
  .elder-add .plus{font-size:1.8em; line-height:1;}

  /* 오늘의 추천 활동 - 차분하지만 또렷한 주(主) 버튼 */
  .cta-btn{display:block; width:100%; border:none; cursor:pointer; color:#fff;
    font-size:1.35em; font-weight:700; padding:22px 18px; border-radius:16px; text-align:center;
    letter-spacing:-.3px; background:linear-gradient(135deg,#356A4E 0%, #21402F 100%);
    box-shadow:0 2px 0 rgba(20,40,28,.5), 0 10px 26px rgba(33,64,47,.22);
    transition:transform .06s, box-shadow .06s;}
  .cta-btn:active{transform:translateY(2px); box-shadow:0 0 0, 0 4px 12px rgba(33,64,47,.18);}
  .cta-btn .cta-sub{display:block; font-size:.58em; font-weight:500; opacity:.9; margin-top:7px; letter-spacing:0;}

  /* 메인(로그인) 히어로 — 사진 중심 + 편집디자인 느낌 캡션 */
  .hero{border-radius:24px; overflow:hidden; margin:8px 0 4px; background:#FBF8F1;
    border:1px solid var(--line); box-shadow:0 1px 2px rgba(42,39,35,.05), 0 26px 56px -16px rgba(42,39,35,.22);}
  .hero-img{display:block; width:100%; height:auto;}
  .hero-plate{position:relative; background:linear-gradient(180deg,#FFFFFF 0%, #FBF8F1 100%);
    padding:0 24px 26px; text-align:center;}
  .hero-mark{position:relative; z-index:2; width:60px; height:60px; border-radius:50%; background:#fff;
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center;
    margin:-30px auto 12px; box-shadow:0 10px 24px -8px rgba(42,39,35,.28);}
  .hero-kicker{display:block; font-size:.72em; font-weight:800; letter-spacing:.2em; color:var(--amber);}
  .hero-title{font-size:2.05em; font-weight:800; letter-spacing:-1.4px; margin:8px 0 0; color:var(--green-d);}
  .hero-sub{margin-top:9px; font-size:1em; color:var(--muted);}
  .hero-rule{width:30px; height:2px; background:var(--line); border-radius:2px; margin:14px auto 0;}

  /* 꽃가루 효과 */
  .confetti{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:60;}
  .confetti i{position:absolute; top:-40px; font-size:1.7em; animation:fall linear forwards;}
  @keyframes fall{ to{ transform:translateY(115vh) rotate(560deg); opacity:.85; } }

  /* 인쇄 / PDF */
  .print-only{display:none;}

  /* 보호자 리포트 — 전문가 문서 양식 */
  .rpt-head{border-bottom:2px solid var(--ink); padding-bottom:12px;}
  .rpt-head-top{display:flex; align-items:center; gap:10px;}
  .rpt-facility{font-size:1.15em; font-weight:800; letter-spacing:-.3px; line-height:1.2;}
  .rpt-program{font-size:.72em; color:var(--muted); margin-top:2px;}
  .rpt-title{font-size:1.45em; font-weight:800; letter-spacing:-.5px; margin:13px 0 11px;}
  .rpt-meta{width:100%; border-collapse:collapse; font-size:.82em;}
  .rpt-meta th{text-align:left; color:var(--muted); font-weight:700; width:62px; padding:3px 8px 3px 0; white-space:nowrap; vertical-align:top;}
  .rpt-meta td{padding:3px 16px 3px 0; font-weight:600;}
  .rpt-sec{margin-top:22px;}
  .rpt-sec > h3{font-size:.76em; font-weight:800; letter-spacing:.13em; color:var(--green-d);
    border-bottom:1px solid var(--line); padding-bottom:6px; margin:0 0 12px;
    display:flex; align-items:center; gap:8px;}
  .rpt-sec > h3::before{content:""; width:3px; height:13px; background:var(--amber); display:inline-block; border-radius:2px;}
  .rpt-table{width:100%; border-collapse:collapse; font-size:.92em;}
  .rpt-table th{text-align:left; color:var(--muted); font-weight:700; font-size:.82em; padding:6px 8px; border-bottom:1.5px solid var(--line);}
  .rpt-table td{padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:middle;}
  .rpt-table td.num{text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap;}
  .rpt-summary{display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
  .rpt-summary .cell{border:1px solid var(--line); border-radius:10px; padding:13px 6px; text-align:center;}
  .rpt-summary .v{font-size:1.5em; font-weight:800; color:var(--green-d); line-height:1;}
  .rpt-summary .l{font-size:.72em; color:var(--muted); margin-top:4px;}
  .rpt-bar{height:8px; background:#ECE5D6; border-radius:4px; overflow:hidden; min-width:54px;}
  .rpt-bar>span{display:block; height:100%; background:var(--green-d); border-radius:4px;}
  .rpt-quote{border-left:3px solid var(--amber); background:#FAF7F0; padding:11px 14px; border-radius:0 8px 8px 0; line-height:1.7;}
  .rpt-narr{line-height:1.85;}
  .rpt-sign{display:flex; justify-content:flex-end; gap:30px; margin-top:18px; font-size:.82em; color:var(--muted);}
  .rpt-sign span{border-bottom:1px solid var(--line); min-width:120px; display:inline-block; padding-bottom:2px;}

  /* 참여 상장 — A4 세로 정식 상장 (정밀 정렬) */
  .cert-page{ container-type:inline-size; position:relative; width:100%; max-width:620px; margin:6px auto 0;
    aspect-ratio:210/297; background:#FFFDF7; box-sizing:border-box; overflow:hidden;
    border-radius:4px; box-shadow:0 8px 30px rgba(42,39,35,.20); color:#1f1c17;}
  .cert-border{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:0;}
  .cert-wm{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:40cqw; opacity:.045; pointer-events:none;}
  .cert-body2{ position:absolute; top:8.5cqw; right:10cqw; bottom:8.5cqw; left:10cqw; display:flex; flex-direction:column;}
  .cert-top{ display:flex; justify-content:space-between; align-items:baseline; font-size:2.35cqw; color:#6a6354; letter-spacing:.02em; flex:0 0 auto;}
  .cert-top .iss{ font-weight:800; color:#2A5CA8;}
  .cert-main{ flex:1 1 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
  .cert-h{ display:flex; justify-content:center; gap:7cqw; font-size:15cqw; font-weight:700; line-height:1; margin:0;
    font-family:'CertSerif','Nanum Myeongjo','Batang',serif; color:#1c1a16;}
  .cert-sub{ font-size:3cqw; color:#B23A2E; font-weight:700; letter-spacing:.5em; margin:3.5cqw 0 0; padding-left:.5em;
    font-family:'CertSerif','Nanum Myeongjo','Batang',serif;}
  .cert-fields{ display:grid; grid-template-columns:16cqw auto 1fr; column-gap:1.6cqw; row-gap:1.8cqw;
    width:auto; margin:8cqw 0 0; text-align:left; font-size:2.95cqw; line-height:1.5;}
  .cert-fields .lab{ text-align:justify; text-align-last:justify; color:#5a5446; white-space:nowrap;}
  .cert-fields .colon{ color:#5a5446;}
  .cert-fields .val{ font-weight:700; word-break:keep-all;}
  .cert-cnr{ position:absolute; width:5cqw; height:5cqw; z-index:1; pointer-events:none;}
  .cert-cnr.nw{ left:4cqw; top:4cqw;}
  .cert-cnr.ne{ right:4cqw; top:4cqw;}
  .cert-cnr.sw{ left:4cqw; bottom:4cqw;}
  .cert-cnr.se{ right:4cqw; bottom:4cqw;}
  .cert-text{ font-size:3.1cqw; line-height:2.15; margin:8cqw 0 0; color:#2a261f;}
  .cert-date{ font-size:3.1cqw; letter-spacing:.08em; margin:4.5cqw 0 0; color:#2a261f;}
  .cert-issue{ display:flex; align-items:center; justify-content:center; gap:2cqw; margin:5cqw 0 0; flex-wrap:nowrap;}
  .cert-org{ font-size:5.6cqw; font-weight:700; letter-spacing:.05em; padding-left:.05em; white-space:nowrap;
    font-family:'CertSerif','Nanum Myeongjo','Batang',serif; color:#1c1a16;}
  .cert-seal{ width:14cqw; height:14cqw; flex:0 0 auto; object-fit:contain;}
  .cert-foot{ flex:0 0 auto; text-align:center; font-size:2.15cqw; color:#9b937f; letter-spacing:.04em;
    padding-top:2cqw;}
  @media print{
    @page{ size:A4 portrait; margin:0; }
    .cert-page{ width:210mm; height:297mm; max-width:none; aspect-ratio:auto; margin:0 auto;
      border-radius:0; box-shadow:none; }
  }

  @media print{
    .topbar, .no-print{ display:none !important; }
    body, #root{ background:#fff !important; }
    .wrap{ max-width:none !important; padding:0 10px !important; }
    .card{ box-shadow:none !important; border:1px solid #bbb !important; break-inside:avoid; }
    .rpt-sec{ break-inside:avoid; }
    .rpt-summary .cell{ border-color:#bbb !important; }
    h1{ font-size:20pt; }
    h2{ font-size:14pt; }
    .print-only{ display:block !important; }
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  }
</style>
